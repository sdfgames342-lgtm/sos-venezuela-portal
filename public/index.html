<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOS Venezuela – Repositorio Ciudadano</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const supabaseClient = supabase.createClient(
      'https://pkajsigfbfwvyddpzhlo.supabase.co',
      'sb_publishable_AfVuP-hufHWREFUS9Q7vzg_4gypxd9U'
    );

    function generateFingerprint() {
      const str = navigator.userAgent + screen.width + screen.height;
      return btoa(str).substring(0, 32);
    }

    function PortalApp() {
      const [fingerprint] = useState(generateFingerprint());
      const [campaigns, setCampaigns] = useState([]);
      
      const [title, setTitle] = useState('');
      const [sourceUrl, setSourceUrl] = useState('');
      const [evidenceUrl, setEvidenceUrl] = useState('');
      const [desc, setDesc] = useState('');
      const [type, setType] = useState('estafa');
      const [feedback, setFeedback] = useState('');

      const loadRepository = useCallback(async () => {
        const { data, error } = await supabaseClient
          .from('crowdfunding_registry')
          .select('*')
          .order('created_at', { ascending: false });
        if (!error && data) setCampaigns(data);
      }, []);

      useEffect(() => {
        loadRepository();
      }, [loadRepository]);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!title || !sourceUrl) {
          setFeedback('⚠️ Título y Enlace de origen son obligatorios.');
          return;
        }

        const { error } = await supabaseClient
          .from('crowdfunding_registry')
          .insert({
            title,
            source_url: sourceUrl,
            evidence_url: evidenceUrl,
            description: desc,
            category: type
          });

        if (error) {
          setFeedback('⚠️ Error al registrar (puede que el enlace ya exista).');
        } else {
          setFeedback('✅ Registro exitoso. Guardado en la base de datos.');
          setTitle(''); setSourceUrl(''); setEvidenceUrl(''); setDesc('');
          loadRepository();
        }
      };

      const handleVote = async (campaignId, delta) => {
        const { error: voteError } = await supabaseClient
          .from('campaign_votes')
          .insert({ campaign_id: campaignId, user_fingerprint: fingerprint, vote_type: delta });

        if (voteError) {
          alert('Ya emitiste tu voto de confianza para este registro.');
          return;
        }

        const campaign = campaigns.find(c => c.id === campaignId);
        const newScore = (campaign.trust_score || 0) + delta;

        await supabaseClient
          .from('crowdfunding_registry')
          .update({ trust_score: newScore })
          .eq('id', campaignId);

        loadRepository();
      };

      return (
        <div className="min-h-screen flex flex-col justify-between">
          <div>
            {/* HEADER CON NUEVO SUBTÍTULO */}
            <header className="p-4 bg-gray-900 border-b border-gray-800 shadow-sm">
              <nav className="flex justify-between items-center max-w-6xl mx-auto">
                <div className="flex flex-col md:flex-row md:items-center gap-1 md:gap-3">
                  <div className="flex items-center gap-2">
                    <span className="text-xl">🛡️</span>
                    <h1 className="text-lg font-black tracking-tight text-white uppercase">
                      SOS Venezuela
                    </h1>
                  </div>
                  <span className="text-xs text-red-400 font-semibold bg-red-950/40 px-2 py-0.5 rounded border border-red-900/40 w-fit">
                    Canal de Validación Financiera y Datos · Proyecto Córdoba-Caracas
                  </span>
                </div>
                <div className="flex gap-4 text-sm font-medium">
                  <a href="/" className="text-red-400 hover:text-red-300 transition-colors">Inicio</a>
                  <a href="/normalizar.html" className="text-gray-400 hover:text-white transition-colors">Normalizar</a>
                  <a href="/mapa.html" className="text-gray-400 hover:text-white transition-colors">Mapa</a>
                </div>
              </nav>
            </header>

            {/* SECCIÓN DE BIENVENIDA CON NUEVAS TARJETAS */}
            <section className="bg-gray-900 py-8 px-4 border-b border-gray-800">
              <div className="max-w-6xl mx-auto text-center md:text-left">
                <h2 className="text-3xl font-extrabold text-white mb-2 tracking-tight">Plataforma de Contraloría e Inteligencia Ciudadana</h2>
                <p className="text-sm text-gray-400 max-w-3xl mb-6">
                  Centralizamos canales de financiamiento seguro, estructuramos el flujo de datos en redes y ofrecemos un canal anónimo de denuncia contra la corrupción institucional.
                </p>
                
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                  
                  <div className="bg-gray-950 p-4 rounded-xl border border-green-900/30 hover:border-green-900/60 transition-all bg-gradient-to-b from-gray-950 to-green-950/10">
                    <span className="text-2xl block mb-2">💰</span>
                    <h3 className="text-sm font-bold text-green-400 mb-1">1. Match de Donación Segura</h3>
                    <p className="text-xs text-gray-400 mb-2">Conectamos de forma directa a donantes internacionales con causas, perfiles y recaudaciones 100% confiables, auditadas colectivamente.</p>
                    <a href="#repositorio" className="text-xs text-green-400 font-semibold hover:underline inline-flex items-center gap-1">Ver Fuentes Confiables ↓</a>
                  </div>
                  
                  <div className="bg-gray-950 p-4 rounded-xl border border-blue-900/30 hover:border-blue-900/60 transition-all bg-gradient-to-b from-gray-950 to-blue-950/10">
                    <span className="text-2xl block mb-2">📊</span>
                    <h3 className="text-sm font-bold text-blue-400 mb-1">2. Estructurar Tendencias</h3>
                    <p className="text-xs text-gray-400 mb-2">Normalizamos hashtags en redes para rescatar listas de heridos y reportes críticos, evitando que el algoritmo hunda la información vital.</p>
                    <a href="/normalizar.html" className="text-xs text-blue-400 font-semibold hover:underline inline-flex items-center gap-1">Normalizar Hashtags →</a>
                  </div>

                  <div className="bg-gray-950 p-4 rounded-xl border border-red-900/30 hover:border-red-900/60 transition-all bg-gradient-to-b from-gray-950 to-red-950/10">
                    <span className="text-2xl block mb-2">🕵️‍♂️</span>
                    <h3 className="text-sm font-bold text-red-400 mb-1">3. Denuncia Anónima Colectiva</h3>
                    <p className="text-xs text-gray-400 mb-2">Canal Zero-Knowledge para exponer esquemas de corrupción gubernamental y abusos de autoridades locales sin dejar rastro digital.</p>
                    <a href="#repositorio" className="text-xs text-red-400 font-semibold hover:underline inline-flex items-center gap-1">Reportar Fraude o Abuso ↓</a>
                  </div>

                </div>
              </div>
            </section>

            {/* AVISO DE API PÚBLICA */}
            <div className="max-w-6xl mx-auto px-4 mt-4">
              <div className="bg-blue-950/40 border border-blue-800/50 p-4 rounded-xl text-xs text-blue-300 shadow-sm">
                <p className="leading-relaxed">
                  <strong className="text-blue-400">⚡ INFRAESTRUCTURA ABIERTA:</strong> En las próximas horas se habilitará una **API pública de acceso directo** para que desarrolladores, brigadas de campo y plataformas aliadas puedan automatizar consultas del repositorio y descargar la base de datos estructurada en formatos **JSON** o **CSV**.
                </p>
              </div>
            </div>

            {/* CONTENIDO PRINCIPAL: DOS COLUMNAS */}
            <main id="repositorio" className="p-4 sm:p-6 max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
              
              {/* COLUMNA DE REGISTRO (1/3) */}
              <div className="lg:col-span-1 space-y-4">
                <div className="bg-gray-900 p-5 rounded-xl border border-gray-800">
                  <div className="flex items-center gap-2 mb-3">
                    <span className="text-xl">🛡️</span>
                    <h2 className="text-base font-bold text-white">Reportar Caso o Campaña</h2>
                  </div>
                  <p className="text-xs text-gray-400 mb-4 leading-relaxed">Tu reporte será procesado de forma anónima (Zero-Knowledge) para alimentar el feed comunitario de auditoría.</p>
                  
                  <form onSubmit={handleSubmit} className="space-y-3.5">
                    <div>
                      <label className="block text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-1">Categoría del reporte</label>
                      <select value={type} onChange={e => setType(e.target.value)} className="w-full p-2 bg-gray-950 border border-gray-800 rounded-lg text-sm text-gray-200 focus:outline-none focus:border-red-600 transition-colors">
                        <option value="estafa">Alerta: Campaña Falsa / Estafa</option>
                        <option value="veridico">Campañas de Recaudación Reales</option>
                        <option value="abuso">Abuso de Autoridad (Militar/Policial)</option>
                      </select>
                    </div>

                    <div>
                      <label className="block text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-1">Título o Implicado</label>
                      <input type="text" value={title} onChange={e => setTitle(e.target.value)} className="w-full p-2 bg-gray-950 border border-gray-800 rounded-lg text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-red-600 transition-colors" placeholder="Ej: Juntos Unidos Donación / Cnel. Pérez" />
                    </div>

                    <div>
                      <label className="block text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-1">Enlace del Post / Perfil sospechoso</label>
                      <input type="url" value={sourceUrl} onChange={e => setSourceUrl(e.target.value)} className="w-full p-2 bg-gray-950 border border-gray-800 rounded-lg text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-red-600 transition-colors" placeholder="https://instagram.com/cuenta_falsa" />
                    </div>

                    <div>
                      <label className="block text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-1">Enlace a las Pruebas (Canal/Tweet)</label>
                      <input type="url" value={evidenceUrl} onChange={e => setEvidenceUrl(e.target.value)} className="w-full p-2 bg-gray-950 border border-gray-800 rounded-lg text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-red-600 transition-colors" placeholder="https://t.me/canal_pruebas/12" />
                    </div>

                    <div>
                      <label className="block text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-1">Detalles o Evidencias textuales</label>
                      <textarea value={desc} onChange={e => setDesc(e.target.value)} rows="3" className="w-full p-2 bg-gray-950 border border-gray-800 rounded-lg text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-red-600 transition-colors" placeholder="Explica brevemente por qué es falso o los detalles del abuso de autoridad..." />
                    </div>

                    <button type="submit" className="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg font-bold text-sm transition-all shadow-md active:scale-[0.98]">
                      Indexar Información
                    </button>
                    {feedback && <p className="text-xs text-yellow-400 mt-2 text-center font-medium">{feedback}</p>}
                  </form>
                </div>

                {/* INFO DEL PROYECTO */}
                <div className="bg-gray-900 p-4 rounded-xl border border-gray-800 text-xs space-y-2.5">
                  <h3 className="text-xs font-bold text-red-400 uppercase tracking-wider flex items-center gap-1">
                    🇻🇪 Proyecto Córdoba-Caracas 🇦🇷
                  </h3>
                  <p className="text-gray-400 leading-normal"><strong className="text-gray-300">Misión/Visión:</strong> Proveer arquitecturas "Zero-Knowledge" resilientes que asfixien las estafas virtuales y resguarden de forma forense las pruebas de abusos informativos en contextos hostiles.</p>
                </div>
              </div>

              {/* COLUMNA DEL HISTORIAL REPOSITORIO (2/3) */}
              <div className="lg:col-span-2 space-y-4">
                <div className="flex flex-col sm:flex-row justify-between sm:items-center gap-3">
                  <div>
                    <h2 className="text-xl font-bold text-white">📂 Historial de Auditoría Ciudadana</h2>
                    <p className="text-xs text-gray-400">Registros validados mediante votación criptográfica por la comunidad.</p>
                  </div>
                  
                  <div className="bg-blue-950/20 border border-blue-900/50 p-2.5 rounded-lg text-xs max-w-xs">
                    <p className="text-blue-300 leading-normal">
                      <strong>💻 ¿Eres dev?</strong> Buscamos ayuda sin fines de lucro. Escríbenos a <a href="mailto:andalucia.terrabyte@gmail.com" className="underline font-bold text-blue-400 hover:text-blue-300">andalucia.terrabyte@gmail.com</a>
                    </p>
                  </div>
                </div>
                
                {campaigns.length === 0 ? (
                  <div className="text-center bg-gray-900 border border-gray-800 p-8 rounded-xl text-gray-500 text-sm">
                    No hay denuncias indexadas en el repositorio. Sé el primero en alertar un caso.
                  </div>
                ) : (
                  campaigns.map(c => (
                    <div key={c.id} className={`p-4 rounded-xl border bg-gray-900 transition-all ${c.category === 'estafa' ? 'border-red-950 hover:border-red-900/50' : c.category === 'abuso' ? 'border-purple-950 hover:border-purple-900/50' : 'border-green-950 hover:border-green-900/50'}`}>
                      <div className="flex justify-between items-start gap-4 mb-2.5">
                        <div>
                          <span className={`text-[10px] px-2 py-0.5 rounded-md font-extrabold uppercase border ${c.category === 'estafa' ? 'bg-red-950/40 text-red-400 border-red-900/40' : c.category === 'abuso' ? 'bg-purple-950/40 text-purple-400 border-purple-900/40' : 'bg-green-950/40 text-green-400 border-green-900/40'}`}>
                            {c.category === 'estafa' ? '🚨 Alerta: Estafa' : c.category === 'abuso' ? '⚠️ Abuso DDHH' : '✅ Campaña Verificada'}
                          </span>
                          <h3 className="text-base font-bold mt-1.5 text-white tracking-tight">{c.title}</h3>
                        </div>
                        
                        <div className="text-center bg-gray-950 p-1.5 rounded-lg border border-gray-800 min-w-[75px]">
                          <span className="block text-[10px] text-gray-500 font-semibold uppercase tracking-wider">Confianza</span>
                          <span className={`text-sm font-black ${c.trust_score >= 0 ? 'text-green-400' : 'text-red-400'}`}>{c.trust_score >= 0 ? `+${c.trust_score}` : c.trust_score}</span>
                          <div className="flex justify-center gap-3 mt-1 border-t border-gray-900 pt-1">
                            <button onClick={() => handleVote(c.id, 1)} className="text-xs text-green-500 hover:text-green-400 transition-colors p-0.5">▲</button>
                            <button onClick={() => handleVote(c.id, -1)} className="text-xs text-red-500 hover:text-red-400 transition-colors p-0.5">▼</button>
                          </div>
                        </div>
                      </div>

                      <p className="text-xs text-gray-400 mb-3.5 leading-relaxed bg-gray-950/40 p-2.5 rounded-lg border border-gray-950">{c.description}</p>
                      
                      <div className="flex flex-wrap gap-4 text-xs font-semibold border-t border-gray-950 pt-2.5">
                        <a href={c.source_url} target="_blank" rel="noopener noreferrer" className="text-blue-400 hover:text-blue-300 transition-colors flex items-center gap-1">
                          🔗 Enlace Origen
                        </a>
                        {c.evidence_url && (
                          <a href={c.evidence_url} target="_blank" rel="noopener noreferrer" className="text-yellow-500 hover:text-yellow-400 transition-colors flex items-center gap-1">
                            📄 Constancia de Pruebas
                          </a>
                        )}
                      </div>
                    </div>
                  ))
                )}
              </div>
            </main>
          </div>

          {/* FOOTER CON DISCLAIMER */}
          <footer className="bg-gray-900 border-t border-gray-800 text-center text-gray-500 p-5 mt-8 space-y-4">
            <div className="max-w-4xl mx-auto text-[10px] text-gray-500 leading-normal border-b border-gray-950 pb-4">
              <strong className="text-gray-400">AVISO LEGAL CIUDADANO:</strong> Este repositorio actúa como un canal descentralizado de auditoría comunitaria y almacenamiento de evidencia histórica. La información aquí reflejada depende estrictamente de las inserciones de los usuarios y de la moderación algorítmica por reputación criptográfica. El equipo de desarrollo no asume responsabilidad civil ni legal alguna por las opiniones, reportes o enlaces provistos por terceros.
            </div>
            <div className="space-y-1">
              <p className="font-semibold text-gray-400 text-xs">
                Proyecto Córdoba-Caracas hecho con ♥ por Andalucia Projects
              </p>
              <p className="text-[10px] text-gray-600">
                © 2026 Andalucia Projects · Proyecto de fundación argentina en proceso de constitución jurídica. Licencias libres y soberanas.
              </p>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PortalApp />);
  </script>
</body>
</html>
