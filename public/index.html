<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOS Venezuela – Repositorio Ciudadano</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#030712] text-gray-200 font-sans antialiased selection:bg-red-500/30 selection:text-red-200">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    const supabaseClient = supabase.createClient(
      'https://pkajsigfbfwvyddpzhlo.supabase.co',
      'sb_publishable_AfVuP-hufHWREFUS9Q7vzg_4gypxd9U'
    );

    function generateFingerprint() {
      const str = navigator.userAgent + screen.width + screen.height;
      return btoa(str).substring(0, 32);
    }

    function getTagForCategory(category) {
      const map = {
        estafa: '#VZN26_dn_fakecf',
        veridico: '#VZN26_dn_realcf',
        abuso: '#VZN26_dn_abuse'
      };
      return map[category] || '#VZN26';
    }

    const TEST_IDS = [
      'd2353976-d0fb-41b9-941b-b8cd0174e888'
    ];

    function PortalApp() {
      const [fingerprint] = useState(generateFingerprint());
      const [campaigns, setCampaigns] = useState([]);
      const [searchTerm, setSearchTerm] = useState('');

      const [showImpugnacion, setShowImpugnacion] = useState(false);
      const [impugnacionId, setImpugnacionId] = useState(null);
      const [descargoText, setDescargoText] = useState('');
      const [impugnacionFeedback, setImpugnacionFeedback] = useState('');

      const loadRepository = useCallback(async () => {
        const { data, error } = await supabaseClient
          .from('crowdfunding_registry')
          .select('*')
          .order('created_at', { ascending: false });
        if (!error && data) setCampaigns(data);
      }, []);

      useEffect(() => {
        loadRepository();
      }, [loadRepository]);

      const handleVote = async (campaignId, delta) => {
        const { error: voteError } = await supabaseClient
          .from('campaign_votes')
          .insert({ campaign_id: campaignId, user_fingerprint: fingerprint, vote_type: delta });

        if (voteError) {
          alert('Tu dispositivo ya emitió un voto para este registro.');
          return;
        }

        const campaign = campaigns.find(c => c.id === campaignId);
        const newScore = (campaign.trust_score || 0) + delta;

        await supabaseClient
          .from('crowdfunding_registry')
          .update({ trust_score: newScore })
          .eq('id', campaignId);

        loadRepository();
      };

      const openImpugnacion = (id) => {
        setImpugnacionId(id);
        setDescargoText('');
        setImpugnacionFeedback('');
        setShowImpugnacion(true);
      };

      const submitImpugnacion = async () => {
        if (!descargoText.trim()) {
          setImpugnacionFeedback('Por favor, escribe un descargo o contraprueba.');
          return;
        }
        setImpugnacionFeedback('✅ Impugnación recibida. Un moderador revisará el caso.');
        setTimeout(() => {
          setShowImpugnacion(false);
          setImpugnacionId(null);
          setDescargoText('');
          setImpugnacionFeedback('');
        }, 2500);
      };

      const filteredCampaigns = useMemo(() => {
        if (!searchTerm.trim()) return campaigns;
        const term = searchTerm.trim().toLowerCase();
        return campaigns.filter(c => {
          const tag = getTagForCategory(c.category);
          return c.title?.toLowerCase().includes(term) ||
                 c.description?.toLowerCase().includes(term) ||
                 tag.toLowerCase().includes(term);
        });
      }, [campaigns, searchTerm]);

      const isTestRecord = (id) => TEST_IDS.includes(id);

      return (
        <div className="min-h-screen flex flex-col justify-between bg-radial from-gray-900 via-gray-950 to-black">
          <div>
            {/* Header */}
            <header className="sticky top-0 z-50 backdrop-blur-md bg-[#090d16]/80 border-b border-gray-800/60 px-4">
              <nav className="flex justify-between items-center max-w-7xl mx-auto h-16">
                <div className="flex items-center gap-3">
                  <span className="text-red-500 animate-pulse font-bold">●</span>
                  <h1 className="text-md font-black tracking-wider text-white uppercase font-mono">SOS VEN - PORTAL</h1>
                  <span className="text-[10px] text-gray-500 font-mono bg-gray-900 border border-gray-800 px-1.5 py-0.5 rounded flex items-center gap-1">
                    v1.2.0
                    <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse inline-block ml-1"></span>
                    <span className="text-emerald-400 text-[8px] font-bold">NODO</span>
                  </span>
                </div>
                <div className="flex items-center gap-1 bg-gray-950 p-1 rounded-lg border border-gray-800/80 text-xs font-mono">
                  <a href="/" className="bg-gray-900 text-white border border-gray-800 px-3 py-1.5 rounded-md transition-all shadow-sm">Inicio</a>
                  <a href="/normalizar.html" className="text-gray-400 hover:text-white px-3 py-1.5 rounded-md transition-all">Normalizar</a>
                  <a href="/mapa.html" className="text-gray-400 hover:text-white px-3 py-1.5 rounded-md transition-all">Mapa</a>
                  <a href="/devs.html" className="text-gray-400 hover:text-white px-3 py-1.5 rounded-md transition-all">Devs</a>
                  <a href="https://www.instagram.com/andaluciaprojects?igsh=MWVueWFmamF1enRs" target="_blank" rel="noopener noreferrer" className="text-gray-400 hover:text-pink-400 transition-colors px-2 py-1.5 rounded-md flex items-center gap-1">
                    <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                    </svg>
                    <span className="hidden sm:inline">Instagram</span>
                  </a>
                </div>
              </nav>
            </header>

            <section className="bg-gradient-to-b from-[#090d16] to-transparent py-10 px-4 border-b border-gray-900/60">
              <div className="max-w-7xl mx-auto">
                <div className="max-w-3xl mb-8">
                  <h2 className="text-3xl md:text-4xl font-black text-white mb-3 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white via-gray-200 to-gray-400">
                    Contraloría e Inteligencia Ciudadana Decentralizada
                  </h2>
                  <p className="text-sm text-gray-400 leading-relaxed font-mono">
                    Protección bajo arquitectura Zero-Knowledge fuera de la jurisdicción de censura local. Mapeamos incidentes, filtramos estafas en tiempo real y normalizamos el flujo de datos.
                  </p>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
                  <a href="#repositorio" className="group card p-4 rounded-xl border border-emerald-500/10 hover:border-emerald-500/30 transition-all bg-gradient-to-b from-transparent to-emerald-950/5 flex flex-col justify-between h-32 shadow-lg shadow-black/40">
                    <div>
                      <div className="flex justify-between items-center mb-1">
                        <h3 className="text-xs font-bold font-mono uppercase tracking-wider text-emerald-400">Match Seguro</h3>
                        <span className="text-lg group-hover:scale-110 transition-transform">💰</span>
                      </div>
                      <p className="text-[11px] text-gray-400">Filtrado y validación colectiva de cuentas de recaudación.</p>
                    </div>
                    <span className="text-[10px] text-emerald-400 font-mono flex items-center gap-1 group-hover:underline">Explorar Padrón ↓</span>
                  </a>

                  <a href="/normalizar.html" className="group card p-4 rounded-xl border border-blue-500/10 hover:border-blue-500/30 transition-all bg-gradient-to-b from-transparent to-blue-950/5 flex flex-col justify-between h-32 shadow-lg shadow-black/40">
                    <div>
                      <div className="flex justify-between items-center mb-1">
                        <h3 className="text-xs font-bold font-mono uppercase tracking-wider text-blue-400">Normalizar</h3>
                        <span className="text-lg group-hover:scale-110 transition-transform">📊</span>
                      </div>
                      <p className="text-[11px] text-gray-400">Estructuración de hashtags para evadir bloqueos algorítmicos.</p>
                    </div>
                    <span className="text-[10px] text-blue-400 font-mono flex items-center gap-1 group-hover:underline">Estructurar Redes →</span>
                  </a>

                  <a href="/denuncias.html" className="group card p-4 rounded-xl border border-red-500/10 hover:border-red-500/30 transition-all bg-gradient-to-b from-transparent to-red-950/5 flex flex-col justify-between h-32 shadow-lg shadow-black/40">
                    <div>
                      <div className="flex justify-between items-center mb-1">
                        <h3 className="text-xs font-bold font-mono uppercase tracking-wider text-red-400">Denuncias</h3>
                        <span className="text-lg group-hover:scale-110 transition-transform">🕵️‍♂️</span>
                      </div>
                      <p className="text-[11px] text-gray-400">Canal forense para abusos de autoridad sin rastro digital.</p>
                    </div>
                    <span className="text-[10px] text-red-400 font-mono flex items-center gap-1 group-hover:underline">Reportar Alerta ↓</span>
                  </a>

                  <a href="/mapa.html" className="group card p-4 rounded-xl border border-cyan-500/10 hover:border-cyan-500/30 transition-all bg-gradient-to-b from-transparent to-cyan-950/5 flex flex-col justify-between h-32 shadow-lg shadow-black/40">
                    <div>
                      <div className="flex justify-between items-center mb-1">
                        <h3 className="text-xs font-bold font-mono uppercase tracking-wider text-cyan-400">Mapa</h3>
                        <span className="text-lg group-hover:scale-110 transition-transform">🗺️</span>
                      </div>
                      <p className="text-[11px] text-gray-400">Visualización geoespacial de incidentes y focos de calor.</p>
                    </div>
                    <span className="text-[10px] text-cyan-400 font-mono flex items-center gap-1 group-hover:underline">Explorar →</span>
                  </a>

                  <a href="/devs.html" className="group card p-4 rounded-xl border border-gray-500/10 hover:border-gray-500/30 transition-all bg-gradient-to-b from-transparent to-gray-950/5 flex flex-col justify-between h-32 shadow-lg shadow-black/40">
                    <div>
                      <div className="flex justify-between items-center mb-1">
                        <h3 className="text-xs font-bold font-mono uppercase tracking-wider text-gray-400">Devs</h3>
                        <span className="text-lg group-hover:scale-110 transition-transform">⚡</span>
                      </div>
                      <p className="text-[11px] text-gray-400">Acceso a API pública, documentación y repositorio.</p>
                    </div>
                    <span className="text-[10px] text-gray-400 font-mono flex items-center gap-1 group-hover:underline">Ir a Consola →</span>
                  </a>
                </div>
              </div>
            </section>

            <div className="max-w-7xl mx-auto px-4 mt-8">
              <div className="bg-blue-950/20 border border-blue-800/30 rounded-xl p-6 md:p-8 shadow-lg shadow-blue-900/10 backdrop-blur-sm">
                <div className="flex flex-col md:flex-row items-start md:items-center gap-6">
                  <div className="flex-1">
                    <h3 className="text-xl md:text-2xl font-bold text-white font-mono flex items-center gap-2 mb-2">
                      <span className="text-blue-400">📢</span> Multiplicá el Alcance Ciudadano
                    </h3>
                    <p className="text-sm text-gray-300 leading-relaxed font-mono">
                      Usá los hashtags normalizados de esta plataforma en cada video o post de tus redes sociales. El sistema optimiza las tendencias para romper el algoritmo, visibilizar la situación en Venezuela y etiquetar automáticamente a las organizaciones, empresas y agencias internacionales que pueden brindar ayuda real.
                    </p>
                    <div className="mt-4 flex flex-wrap items-center gap-3">
                      <a
                        href="/normalizar.html"
                        className="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 px-6 rounded-lg transition-all shadow-lg shadow-blue-900/30 text-sm font-mono"
                      >
                        🚀 Generar hashtags ahora
                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
                      </a>
                      <span className="text-xs text-gray-400 font-mono bg-gray-950/50 px-3 py-1.5 rounded-full border border-gray-800">
                        Ej: #VZN26_dn_fakecf · #VZN26_ls · #SOSCaracas
                      </span>
                    </div>
                  </div>
                  <div className="hidden md:block text-center text-blue-400/30 text-6xl font-mono font-bold select-none">
                    #VZN26
                  </div>
                </div>
              </div>
            </div>

            <main id="repositorio" className="p-4 md:p-6 max-w-7xl mx-auto">
              <div className="flex flex-col sm:flex-row justify-between sm:items-center gap-3 bg-[#090d16]/30 p-4 rounded-xl border border-gray-900 mb-4">
                <div>
                  <h2 className="text-lg font-bold text-white font-mono tracking-tight flex items-center gap-2">
                    <span>📂</span> Historial de Auditoría Ciudadana
                  </h2>
                  <p className="text-xs text-gray-400 font-mono">Validación criptográfica en base a reputación colectiva de red.</p>
                </div>
                <div className="bg-blue-950/20 border border-blue-900/40 p-2.5 rounded-lg text-[11px] max-w-xs font-mono">
                  <p className="text-blue-400/90">
                    <strong>💻 Core Abierto:</strong> Cooperación civil sin fines de lucro en <a href="mailto:andalucia.terrabyte@gmail.com" className="underline font-bold text-blue-400">andalucia.terrabyte@gmail.com</a>
                  </p>
                </div>
              </div>

              <div className="bg-[#090d16]/40 backdrop-blur-sm p-4 rounded-xl border border-gray-800 mb-6">
                <div className="flex flex-col md:flex-row gap-4 items-start md:items-center">
                  <div className="flex-1 w-full">
                    <label htmlFor="search" className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">🔍 Buscar por # o palabra clave</label>
                    <div className="relative">
                      <input
                        id="search"
                        type="text"
                        value={searchTerm}
                        onChange={e => setSearchTerm(e.target.value)}
                        className="w-full p-2.5 bg-gray-950 border border-gray-800 rounded-lg text-gray-200 placeholder-gray-600 focus:outline-none focus:border-blue-500 transition-all font-mono text-sm"
                        placeholder="Ej: #VZN26_dn_fakecf, estafa, abuso..."
                      />
                      {searchTerm && (
                        <button
                          onClick={() => setSearchTerm('')}
                          className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 text-xs"
                        >
                          ✕
                        </button>
                      )}
                    </div>
                  </div>
                  <div className="text-[10px] text-gray-400 font-mono whitespace-nowrap">
                    <span className="bg-gray-950 px-2 py-1 rounded border border-gray-800">
                      {filteredCampaigns.length} resultados
                    </span>
                  </div>
                </div>

                <div className="mt-4 pt-4 border-t border-gray-800/60">
                  <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Códigos de hashtag</p>
                  <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-2 text-[10px] font-mono">
                    <div className="bg-gray-950/60 px-2 py-1 rounded border border-gray-800">
                      <span className="text-emerald-400">#VZN26_ls</span>
                      <span className="text-gray-500 block">Listas / Actas</span>
                    </div>
                    <div className="bg-gray-950/60 px-2 py-1 rounded border border-gray-800">
                      <span className="text-red-400">#VZN26_dn_fakecf</span>
                      <span className="text-gray-500 block">Estafa / Fraude</span>
                    </div>
                    <div className="bg-gray-950/60 px-2 py-1 rounded border border-gray-800">
                      <span className="text-green-400">#VZN26_dn_realcf</span>
                      <span className="text-gray-500 block">Recaudación real</span>
                    </div>
                    <div className="bg-gray-950/60 px-2 py-1 rounded border border-gray-800">
                      <span className="text-purple-400">#VZN26_dn_abuse</span>
                      <span className="text-gray-500 block">Abuso de autoridad</span>
                    </div>
                    <div className="bg-gray-950/60 px-2 py-1 rounded border border-gray-800">
                      <span className="text-yellow-400">#VZN26_dn_hoax</span>
                      <span className="text-gray-500 block">Desmentido / Fake news</span>
                    </div>
                    <div className="bg-gray-950/60 px-2 py-1 rounded border border-gray-800">
                      <span className="text-blue-400">#VZN26_proyectos</span>
                      <span className="text-gray-500 block">Proyectos comunitarios</span>
                    </div>
                  </div>
                  <p className="text-[9px] text-gray-500 mt-2 font-mono">Usa estos códigos en el buscador para filtrar rápidamente.</p>
                </div>
              </div>

              <div className="space-y-3">
                {filteredCampaigns.length === 0 ? (
                  <div className="text-center font-mono bg-[#090d16]/20 border border-gray-900 p-12 rounded-xl text-gray-600 text-xs">
                    {campaigns.length === 0
                      ? '[ REPOSITORIO DE CONTINGENCIA VACÍO — ESPERANDO ENLACES COMUNITARIOS ]'
                      : '[ NINGÚN RESULTADO COINCIDE CON TU BÚSQUEDA ]'}
                  </div>
                ) : (
                  filteredCampaigns.map(c => {
                    const isTest = isTestRecord(c.id);
                    return (
                      <div key={c.id} className={`p-4 rounded-xl border bg-[#090d16]/60 backdrop-blur-sm transition-all shadow-md flex flex-col md:flex-row justify-between gap-4 ${
                        c.category === 'estafa' ? 'border-red-950/40 hover:border-red-900/40' :
                        c.category === 'abuso' ? 'border-purple-950/40 hover:border-purple-900/40' :
                        'border-emerald-950/40 hover:border-emerald-900/40'
                      }`}>
                        <div className="flex-1 space-y-2">
                          <div className="flex flex-wrap items-center gap-2">
                            <span className={`text-[9px] px-2 py-0.5 rounded-md font-bold tracking-wider uppercase border font-mono ${
                              c.category === 'estafa' ? 'bg-red-950/50 text-red-400 border-red-900/30' :
                              c.category === 'abuso' ? 'bg-purple-950/50 text-purple-400 border-purple-900/30' :
                              'bg-emerald-950/50 text-emerald-400 border-emerald-900/30'
                            }`}>
                              {c.category === 'estafa' ? '🚨 Reporte: Fraude / Estafa' : c.category === 'abuso' ? '⚠️ Alerta Abuso' : '✅ Cuenta Verificada'}
                            </span>
                            <span className="text-[10px] text-blue-400 font-mono bg-blue-950/30 px-1.5 py-0.5 rounded border border-blue-900/30">
                              {getTagForCategory(c.category)}
                            </span>
                            {c.lat && c.lng && (
                              <span className="text-[10px] text-gray-500 font-mono bg-gray-950 border border-gray-900 px-1.5 py-0.5 rounded">
                                📍 {parseFloat(c.lat).toFixed(4)}, {parseFloat(c.lng).toFixed(4)}
                              </span>
                            )}
                            {isTest && (
                              <span className="text-[9px] bg-yellow-500/20 text-yellow-400 border border-yellow-500/40 px-2 py-0.5 rounded-full font-mono flex items-center gap-1">
                                🧪 Registro de prueba
                              </span>
                            )}
                          </div>
                          <h3 className="text-base font-bold text-white tracking-tight">{c.title}</h3>
                          <p className="text-xs text-gray-400 leading-relaxed bg-black/40 p-3 rounded-lg border border-gray-950 font-mono">
                            {c.description}
                          </p>
                          <div className="flex flex-wrap gap-4 text-[11px] font-mono pt-1">
                            <a href={c.source_url} target="_blank" rel="noopener noreferrer" className="text-blue-400 hover:text-blue-300 transition-colors flex items-center gap-1 font-semibold underline decoration-blue-500/30">
                              🔗 Enlace Incriminado / Post
                            </a>
                            {c.evidence_url && (
                              <a href={c.evidence_url} target="_blank" rel="noopener noreferrer" className="text-amber-400 hover:text-amber-300 transition-colors flex items-center gap-1 font-semibold underline decoration-amber-500/30">
                                📄 Enlace de Respaldo Forense
                              </a>
                            )}
                            <button
                              onClick={() => openImpugnacion(c.id)}
                              className="text-yellow-400 hover:text-yellow-300 transition-colors flex items-center gap-1 font-semibold underline decoration-yellow-500/30"
                            >
                              ⚖️ Impugnar Reporte
                            </button>
                          </div>
                        </div>
                        <div className="flex md:flex-col justify-between items-center bg-gray-950/80 p-2.5 rounded-xl border border-gray-800/80 min-w-[100px] h-fit md:h-24 shadow-inner font-mono">
                          <span className="text-[9px] text-gray-500 uppercase tracking-wider font-bold">Confianza</span>
                          <span className={`text-base font-black tracking-tighter ${c.trust_score >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                            {c.trust_score >= 0 ? `+${c.trust_score}` : c.trust_score}
                          </span>
                          <div className="flex gap-2 border-t md:border-t-0 border-gray-900 pt-1 md:pt-0">
                            <button onClick={() => handleVote(c.id, 1)} className="bg-emerald-950/40 hover:bg-emerald-900/60 border border-emerald-900/40 text-emerald-400 w-6 h-6 flex items-center justify-center rounded transition-all font-bold text-xs">▲</button>
                            <button onClick={() => handleVote(c.id, -1)} className="bg-red-950/40 hover:bg-red-900/60 border border-red-900/40 text-red-400 w-6 h-6 flex items-center justify-center rounded transition-all font-bold text-xs">▼</button>
                          </div>
                        </div>
                      </div>
                    );
                  })
                )}
              </div>
            </main>
          </div>

          {showImpugnacion && (
            <div className="fixed inset-0 z-[999] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
              <div className="bg-[#090d16] border border-gray-800 rounded-xl p-6 max-w-lg w-full shadow-2xl">
                <h3 className="text-lg font-bold text-white font-mono mb-3">⚖️ Impugnar Reporte</h3>
                <p className="text-xs text-gray-400 mb-4 leading-relaxed">
                  Si consideras que este reporte es falso, injurioso o contiene información errónea, escribe tu descargo o adjunta un enlace a una contraprueba.
                </p>
                <textarea
                  value={descargoText}
                  onChange={e => setDescargoText(e.target.value)}
                  rows="4"
                  className="w-full p-2.5 bg-gray-950 border border-gray-800 rounded-lg text-gray-200 placeholder-gray-600 focus:outline-none focus:border-yellow-500 transition-all text-sm font-mono"
                  placeholder="Describe los motivos de tu impugnación o pega enlaces a pruebas..."
                />
                {impugnacionFeedback && (
                  <div className="mt-2 text-xs text-yellow-400 font-mono">{impugnacionFeedback}</div>
                )}
                <div className="flex justify-end gap-3 mt-4">
                  <button
                    onClick={() => setShowImpugnacion(false)}
                    className="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-xs font-bold uppercase transition-all"
                  >
                    Cancelar
                  </button>
                  <button
                    onClick={submitImpugnacion}
                    className="px-4 py-2 bg-yellow-600 hover:bg-yellow-500 rounded-lg text-xs font-bold uppercase transition-all shadow-lg shadow-yellow-900/20"
                  >
                    Enviar Impugnación
                  </button>
                </div>
                <p className="text-[9px] text-gray-500 mt-3 font-mono">
                  Tu impugnación será revisada por la comunidad. No se almacenan datos personales.
                </p>
              </div>
            </div>
          )}

          <footer className="bg-[#070b12] border-t border-gray-900/60 p-6 text-center text-gray-400 space-y-4 font-mono text-xs">
            <div className="max-w-5xl mx-auto space-y-3">
              <div className="text-[11px] text-gray-400 font-semibold">Aviso de Neutralidad Tecnológica y Auditoría Ciudadana</div>
              <div className="text-[10px] text-gray-400/80 leading-relaxed border-b border-gray-800/50 pb-3">
                Esta plataforma opera exclusivamente como un nodo de infraestructura tecnológica automatizado para la indexación de archivos y documentos de interés público, al amparo del Artículo 13 de la Convención Americana sobre Derechos Humanos y la Convención de las Naciones Unidas contra la Corrupción.
                <br /><br />
                El sistema no genera, edita, promociona ni valida la veracidad de los reportes emitidos de forma anónima por los usuarios. Toda mención a presuntos hechos delictivos debe entenderse bajo el principio de inocencia y en carácter potencial (artículo atribuible a las fuentes documentales aportadas). La plataforma se compromete a remover de forma expedita cualquier registro que, mediante el canal de impugnación oficial, se demuestre fehacientemente como falso, injurioso o violatorio de la legislación internacional de derechos humanos.
              </div>
              <div className="text-[10px] text-gray-500/80 leading-relaxed">
                <span className="font-bold text-gray-400">Política de Zero-Knowledge:</span> Esta plataforma no registra, almacena ni procesa direcciones IP, metadatos de conectividad, geolocalizaciones precisas de red de los nodos emisores, ni datos de identidad de los usuarios de conformidad con las directrices globales de privacidad por diseño (Privacy by Design).
              </div>
            </div>
            <div className="pt-3 border-t border-gray-900/40 space-y-1">
              <p className="font-bold text-gray-400 text-xs tracking-tight">
                Proyecto Córdoba-Caracas · Desarrollado por Andalucia Projects 🇦🇷
              </p>
              <p className="text-[10px] text-gray-600">
                © 2026 Andalucia Projects · Framework de desarrollo con fines educativos e impacto social humanitario. Licencias libres y código abierto.
              </p>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PortalApp />);
  </script>
</body>
</html>
