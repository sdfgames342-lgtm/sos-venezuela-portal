<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Normalizar – SOS Venezuela</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#030712] text-gray-200 font-sans antialiased selection:bg-red-500/30 selection:text-red-200">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const supabaseClient = supabase.createClient(
      'https://pkajsigfbfwvyddpzhlo.supabase.co',
      'sb_publishable_AfVuP-hufHWREFUS9Q7vzg_4gypxd9U'
    );

    // ============================================================
    // Lista de todos los hashtags disponibles
    // ============================================================
    const ALL_TAGS = [
      { id: 'ls', label: '#VZN26_ls', desc: 'Listas / Actas' },
      { id: 'fakecf', label: '#VZN26_dn_fakecf', desc: 'Estafa / Fraude' },
      { id: 'realcf', label: '#VZN26_dn_realcf', desc: 'Recaudación real' },
      { id: 'abuse', label: '#VZN26_dn_abuse', desc: 'Abuso de autoridad' },
      { id: 'hoax', label: '#VZN26_dn_hoax', desc: 'Desmentido / Fake news' },
      { id: 'proyectos', label: '#VZN26_proyectos', desc: 'Proyectos comunitarios' },
    ];

    // ============================================================
    // Datos del carrusel (4 tarjetas)
    // ============================================================
    const slides = [
      {
        id: 1,
        icon: '🔎',
        title: '1. Centralización Forense',
        text: 'Internet está lleno de perfiles dispersos publicando listas y actas. Nuestra plataforma unifica el flujo de datos: indexa de forma anónima a quienes desvían la ayuda humanitaria y centraliza las pruebas en un solo lugar.',
        footer: 'Un mapa forense inmune a la censura local.'
      },
      {
        id: 2,
        icon: '👤',
        title: '2. Anonimato y Contrainteligencia',
        text: 'Diseñado bajo una arquitectura que no rastrea tu identidad. Podés denunciar con nombres y pruebas sin dejar huella digital, evadiendo la persecución de los organismos de censura.',
        footer: 'Tu seguridad es la prioridad del sistema.'
      },
      {
        id: 3,
        icon: '⚡',
        title: '3. El Acelerador de Indexación',
        text: 'Al estructurar tus publicaciones con nuestros hashtags normalizados, activás un motor que automatiza la lectura de tu reporte. Tu video de auxilio pasa de estar perdido en las redes a ser procesado por el mapa en segundos.',
        footer: 'Menos pasos para el usuario, más velocidad de respuesta.'
      },
      {
        id: 4,
        icon: '💥',
        title: '4. Romper el Algoritmo',
        text: 'Maximizamos el alcance de los reportes críticos enganchándolos a las tendencias globales del momento. Obligamos al algoritmo a mostrar el contenido para que llegue rápido a perfiles de ayuda internacional.',
        footer: 'Centralizados bajo un mismo hashtag, somos visibles.'
      }
    ];

    // ============================================================
    // Lógica de normalización
    // ============================================================
    function generarTextoNormalizado(userText, tagsSeleccionados, tendenciasDia = [], ubicacion = '') {
      const raiz = "#VZN26";
      const tagsSet = new Set([raiz]);
      tagsSeleccionados.forEach(tag => tagsSet.add(tag));

      if (ubicacion && ubicacion.trim().length > 0) {
        const locClean = ubicacion.trim()
          .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
          .replace(/[^a-zA-Z0-9]/g, '')
          .toUpperCase();
        if (locClean.length > 0) tagsSet.add(`#SOS${locClean}`);
      }

      const tendenciasSanitizadas = tendenciasDia
        .filter(t => t && t.trim().length > 0)
        .map(t => t.startsWith('#') ? t : `#${t}`)
        .join(' ');
      if (tendenciasSanitizadas) {
        tendenciasSanitizadas.split(' ').forEach(t => tagsSet.add(t));
      }

      const bloqueHashtags = Array.from(tagsSet).join(' ').trim();
      return `${userText}\n\n${bloqueHashtags}`;
    }

    // ============================================================
    // Componente principal
    // ============================================================
    function NormalizarApp() {
      // Estados del carrusel
      const [slideIndex, setSlideIndex] = useState(0);
      const [touchStart, setTouchStart] = useState(null);
      const [touchEnd, setTouchEnd] = useState(null);

      const nextSlide = () => setSlideIndex((prev) => (prev + 1) % slides.length);
      const prevSlide = () => setSlideIndex((prev) => (prev - 1 + slides.length) % slides.length);
      const goToSlide = (index) => setSlideIndex(index);

      const handleTouchStart = (e) => setTouchStart(e.targetTouches[0].clientX);
      const handleTouchMove = (e) => setTouchEnd(e.targetTouches[0].clientX);
      const handleTouchEnd = () => {
        if (!touchStart || !touchEnd) return;
        const distance = touchStart - touchEnd;
        if (distance > 50) nextSlide();
        if (distance < -50) prevSlide();
        setTouchStart(null);
        setTouchEnd(null);
      };

      // Estados del formulario
      const [selectedTags, setSelectedTags] = useState([]);
      const [userText, setUserText] = useState('');
      const [ubicacion, setUbicacion] = useState('');
      const [tendencias, setTendencias] = useState([]);
      const [preview, setPreview] = useState('');
      const [error, setError] = useState('');
      const MAX_SELECT = 3;

      // Cargar tendencias
      useEffect(() => {
        async function loadTrends() {
          const { data, error } = await supabaseClient
            .from('app_settings')
            .select('value')
            .eq('key', 'live_trends')
            .single();

          if (!error && data) {
            const trendValue = data.value;
            if (typeof trendValue === 'string') {
              setTendencias([trendValue]);
            } else if (Array.isArray(trendValue)) {
              setTendencias(trendValue);
            } else if (trendValue && typeof trendValue === 'object' && trendValue.trend) {
              setTendencias([trendValue.trend]);
            } else {
              setTendencias(['#EmergenciaVE']);
            }
          } else {
            setTendencias(['#EmergenciaVE']);
          }
        }
        loadTrends();
        const interval = setInterval(loadTrends, 300000);
        return () => clearInterval(interval);
      }, []);

      const sanitizeText = (text) => {
        let clean = text.replace(/\b(ba\s?){2,}/gi, '');
        const insults = ['puto', 'marico', 'guevon', 'malparido', 'hdp', 'hijueputa'];
        insults.forEach(word => {
          const regex = new RegExp(`\\b${word}\\b`, 'gi');
          clean = clean.replace(regex, '[abuso detectado]');
        });
        return clean.trim();
      };

      const toggleTag = (tagId) => {
        const tag = ALL_TAGS.find(t => t.id === tagId);
        if (!tag) return;
        setSelectedTags(prev => {
          const isSelected = prev.some(t => t.id === tagId);
          if (isSelected) return prev.filter(t => t.id !== tagId);
          if (prev.length >= MAX_SELECT) {
            alert(`Solo puedes seleccionar hasta ${MAX_SELECT} hashtags.`);
            return prev;
          }
          return [...prev, tag];
        });
      };

      const handleGenerate = () => {
        const sanitized = sanitizeText(userText);
        if (sanitized.length < 80) {
          setError('El texto limpio debe tener al menos 80 caracteres.');
          return;
        }
        setError('');
        if (selectedTags.length === 0) {
          setError('Selecciona al menos un hashtag.');
          return;
        }
        const tagsLabels = selectedTags.map(t => t.label);
        const result = generarTextoNormalizado(sanitized, tagsLabels, tendencias, ubicacion);
        setPreview(result);
        navigator.clipboard.writeText(result)
          .then(() => alert('✅ Bloque copiado. Ahora pégalo en tus redes.'))
          .catch(() => alert('⚠️ Copiá manualmente el texto desde la vista previa.'));
      };

      const isSelected = (tagId) => selectedTags.some(t => t.id === tagId);

      return (
        <div className="min-h-screen flex flex-col justify-between bg-radial from-gray-900 via-gray-950 to-black">
          <div>
            {/* ===== HEADER ===== */}
            <header className="sticky top-0 z-50 backdrop-blur-md bg-[#090d16]/80 border-b border-gray-800/60 px-4 py-2">
              <div className="flex flex-col max-w-7xl mx-auto gap-1">
                <div className="flex justify-between items-center">
                  <div className="flex items-center gap-2">
                    <span className="text-red-500 animate-pulse font-bold">●</span>
                    <h1 className="text-md font-black tracking-wider text-white uppercase font-mono">SOS VEN - PORTAL</h1>
                    <span className="text-[10px] text-gray-500 font-mono bg-gray-900 border border-gray-800 px-1.5 py-0.5 rounded flex items-center gap-1">
                      v1.2.0
                      <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse inline-block ml-1"></span>
                      <span className="text-emerald-400 text-[8px] font-bold">NODO</span>
                    </span>
                  </div>
                </div>
                <div className="flex flex-wrap justify-center items-center gap-1 bg-gray-950 p-1 rounded-lg border border-gray-800/80 text-xs font-mono">
                  <a href="/" className="bg-gray-900 text-white border border-gray-800 px-3 py-1.5 rounded-md transition-all shadow-sm">Inicio</a>
                  <a href="/normalizar.html" className="text-gray-400 hover:text-white px-3 py-1.5 rounded-md transition-all">Normalizar</a>
                  <a href="/mapa.html" className="text-gray-400 hover:text-white px-3 py-1.5 rounded-md transition-all">Mapa</a>
                  <a href="/devs.html" className="text-gray-400 hover:text-white px-3 py-1.5 rounded-md transition-all">Devs</a>
                  <a href="https://www.instagram.com/andaluciaprojects?igsh=MWVueWFmamF1enRs" target="_blank" rel="noopener noreferrer" className="text-gray-400 hover:text-pink-400 transition-colors px-2 py-1.5 rounded-md flex items-center gap-1">
                    <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                    </svg>
                    <span className="hidden sm:inline">Instagram</span>
                  </a>
                </div>
              </div>
            </header>

            {/* ===== CARRUSEL DE INTRODUCCIÓN ===== */}
            <div className="max-w-7xl mx-auto px-4 mt-6">
              <div className="relative overflow-hidden rounded-xl bg-blue-950/20 border border-blue-800/30 shadow-lg shadow-blue-900/10 backdrop-blur-sm p-6 md:p-8">
                <div className="absolute inset-0 opacity-15 bg-cover bg-center bg-no-repeat" style={{ backgroundImage: "url('/img/andalucia-logo.png')" }}></div>
                <div className="absolute inset-0 bg-gradient-to-r from-blue-950/60 via-blue-950/40 to-transparent"></div>

                <div className="relative z-10">
                  <div className="flex items-center gap-4">
                    <button onClick={prevSlide} className="hidden md:flex items-center justify-center w-10 h-10 rounded-full bg-gray-950/60 hover:bg-gray-800/80 border border-gray-700 text-gray-400 hover:text-white transition-all flex-shrink-0">
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
                    </button>

                    <div className="flex-1 overflow-hidden" onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
                      <div className="flex transition-transform duration-500 ease-in-out" style={{ transform: `translateX(-${slideIndex * 100}%)` }}>
                        {slides.map((slide) => (
                          <div key={slide.id} className="w-full flex-shrink-0 px-2">
                            <div className="bg-[#090d16]/80 backdrop-blur-sm p-6 rounded-xl border border-gray-800 shadow-xl min-h-[220px] flex flex-col justify-between">
                              <div>
                                <div className="flex items-center gap-3 mb-3">
                                  <span className="text-3xl">{slide.icon}</span>
                                  <h3 className="text-lg font-bold text-white font-mono">{slide.title}</h3>
                                </div>
                                <p className="text-sm text-gray-300 leading-relaxed font-mono">{slide.text}</p>
                              </div>
                              <div className="mt-4 pt-3 border-t border-gray-800/60">
                                <p className="text-xs text-blue-400 font-mono italic">{slide.footer}</p>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    <button onClick={nextSlide} className="hidden md:flex items-center justify-center w-10 h-10 rounded-full bg-gray-950/60 hover:bg-gray-800/80 border border-gray-700 text-gray-400 hover:text-white transition-all flex-shrink-0">
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
                    </button>
                  </div>

                  <div className="flex justify-center gap-2 mt-6">
                    {slides.map((_, idx) => (
                      <button key={idx} onClick={() => goToSlide(idx)} className={`w-2.5 h-2.5 rounded-full transition-all ${idx === slideIndex ? 'bg-blue-400 w-6' : 'bg-gray-600 hover:bg-gray-400'}`} />
                    ))}
                  </div>
                </div>
              </div>
            </div>

            {/* ===== FORMULARIO ===== */}
            <main className="p-4 md:p-6 max-w-4xl mx-auto">
              <div className="bg-[#090d16]/80 backdrop-blur-md p-6 rounded-xl border border-gray-800 shadow-xl">
                <h2 className="text-xl font-bold text-white font-mono mb-4 flex items-center gap-2">
                  <span className="text-blue-400">📢</span> Generador de Hashtags Normalizados
                </h2>

                <div className="space-y-4 text-xs font-mono">
                  <div>
                    <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">
                      Selecciona hasta {MAX_SELECT} hashtags
                    </label>
                    <div className="flex flex-wrap gap-2">
                      {ALL_TAGS.map(tag => (
                        <button key={tag.id} onClick={() => toggleTag(tag.id)} className={`px-3 py-1.5 rounded-lg border transition-all font-mono text-[11px] ${isSelected(tag.id) ? 'bg-blue-600/40 border-blue-500 text-blue-200 shadow-lg shadow-blue-900/30' : 'bg-gray-950/60 border-gray-700 text-gray-400 hover:border-gray-500 hover:text-gray-200'}`}>
                          {tag.label}
                          <span className="text-[9px] text-gray-500 block">{tag.desc}</span>
                        </button>
                      ))}
                    </div>
                    <p className="text-[10px] text-gray-500 mt-2">{selectedTags.length} de {MAX_SELECT} seleccionados</p>
                  </div>

                  <div>
                    <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Ubicación (opcional)</label>
                    <input type="text" value={ubicacion} onChange={e => setUbicacion(e.target.value)} className="w-full p-2.5 bg-gray-950 border border-gray-800 rounded-lg text-gray-200 placeholder-gray-700 focus:outline-none focus:border-blue-500 transition-all" placeholder="Ej: Caracas, Valencia, Zulia..." />
                    <p className="text-[10px] text-gray-500 mt-1">Si escribes una ciudad, se generará un hashtag geolocalizado (ej. #SOSCaracas).</p>
                  </div>

                  <div>
                    <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Tu descripción o enlace</label>
                    <textarea value={userText} onChange={e => setUserText(e.target.value)} rows="4" className="w-full p-2.5 bg-gray-950 border border-gray-800 rounded-lg text-gray-200 placeholder-gray-700 focus:outline-none focus:border-blue-500 transition-all resize-none" placeholder="Escribí al menos 80 caracteres..." />
                    <span className="text-[10px] text-gray-500">{userText.trim().length}/80</span>
                    {error && <p className="text-red-400 text-[11px] mt-1">{error}</p>}
                  </div>

                  <div>
                    <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Tendencias del día (inyección)</label>
                    <div className="flex flex-wrap gap-1 bg-gray-950 p-2 rounded-lg border border-gray-800 min-h-8">
                      {tendencias.length > 0 ? (
                        tendencias.map((t, idx) => (
                          <span key={idx} className="text-blue-400 text-[11px] bg-blue-950/30 px-2 py-0.5 rounded border border-blue-900/30">{t.startsWith('#') ? t : `#${t}`}</span>
                        ))
                      ) : (
                        <span className="text-gray-500 text-[11px]">Cargando tendencias…</span>
                      )}
                    </div>
                    <p className="text-[10px] text-gray-500 mt-1">Estos hashtags se añadirán automáticamente a tu publicación.</p>
                  </div>

                  <button onClick={handleGenerate} className="w-full bg-gradient-to-r from-blue-700 to-blue-600 hover:from-blue-600 hover:to-blue-500 text-white py-2.5 rounded-lg font-bold uppercase tracking-wider shadow-lg shadow-blue-900/20 active:scale-[0.99] transition-all">
                    Generar y copiar
                  </button>

                  {preview && (
                    <div className="mt-4">
                      <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Vista previa generada:</label>
                      <pre className="bg-[#030712] p-3 rounded-lg border border-gray-800 text-gray-300 text-[11px] whitespace-pre-wrap font-mono">{preview}</pre>
                    </div>
                  )}
                </div>
              </div>
            </main>
          </div>

          {/* ===== FOOTER ===== */}
          <footer className="bg-[#070b12] border-t border-gray-900/60 p-6 text-center text-gray-400 space-y-4 font-mono text-xs">
            <div className="max-w-5xl mx-auto space-y-3">
              <div className="text-[11px] text-gray-400 font-semibold">Aviso de Neutralidad Tecnológica y Auditoría Ciudadana</div>
              <div className="text-[10px] text-gray-400/80 leading-relaxed border-b border-gray-800/50 pb-3">
                Esta plataforma opera exclusivamente como un nodo de infraestructura tecnológica automatizado para la indexación de archivos y documentos de interés público, al amparo del Artículo 13 de la Convención Americana sobre Derechos Humanos y la Convención de las Naciones Unidas contra la Corrupción.
                <br /><br />
                El sistema no genera, edita, promociona ni valida la veracidad de los reportes emitidos de forma anónima por los usuarios. Toda mención a presuntos hechos delictivos debe entenderse bajo el principio de inocencia y en carácter potencial (artículo atribuible a las fuentes documentales aportadas). La plataforma se compromete a remover de forma expedita cualquier registro que, mediante el canal de impugnación oficial, se demuestre fehacientemente como falso, injurioso o violatorio de la legislación internacional de derechos humanos.
              </div>
              <div className="text-[10px] text-gray-500/80 leading-relaxed">
                <span className="font-bold text-gray-400">Política de Zero-Knowledge:</span> Esta plataforma no registra, almacena ni procesa direcciones IP, metadatos de conectividad, geolocalizaciones precisas de red de los nodos emisores, ni datos de identidad de los usuarios de conformidad con las directrices globales de privacidad por diseño (Privacy by Design).
              </div>
            </div>
            <div className="pt-3 border-t border-gray-900/40 space-y-1">
              <p className="font-bold text-gray-400 text-xs tracking-tight">
                Proyecto Córdoba-Caracas · Desarrollado por Andalucia Projects 🇦🇷
              </p>
              <p className="text-[10px] text-gray-600">
                © 2026 Andalucia Projects · Framework de desarrollo con fines educativos e impacto social humanitario. Licencias libres y código abierto.
              </p>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NormalizarApp />);
  </script>
</body>
</html>
