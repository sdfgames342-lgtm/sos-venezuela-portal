<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Normalizar – SOS Venezuela</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const supabaseClient = supabase.createClient(
      'https://pkajsigfbfwvyddpzhlo.supabase.co',
      'sb_publishable_AfVuP-hufHWREFUS9Q7vzg_4gypxd9U'
    );

    function sanitizeText(text) {
      let clean = text.replace(/\b(ba\s?){2,}/gi, '');
      const insults = ['puto', 'marico', 'guevon', 'malparido', 'hdp', 'hijueputa'];
      insults.forEach(word => {
        const regex = new RegExp(`\\b${word}\\b`, 'gi');
        clean = clean.replace(regex, '[abuso detectado]');
      });
      return clean.trim();
    }

    function generateFingerprint() {
      const str = navigator.userAgent + screen.width + screen.height;
      return btoa(str).substring(0, 32);
    }

    function NormalizarApp() {
      const [category, setCategory] = useState('listas');
      const [userText, setUserText] = useState('');
      const [trendData, setTrendData] = useState(null);
      const [preview, setPreview] = useState('');
      const [error, setError] = useState('');
      const [activeList, setActiveList] = useState(null);
      const [fingerprint] = useState(generateFingerprint());
      const [listFeedback, setListFeedback] = useState('');

      useEffect(() => {
        async function loadTrends() {
          const { data, error } = await supabaseClient
            .from('app_settings')
            .select('value')
            .eq('key', 'live_trends')
            .single();
          if (!error && data) setTrendData(data.value);
        }
        loadTrends();
        const interval = setInterval(loadTrends, 300000);
        return () => clearInterval(interval);
      }, []);

      const loadActiveList = useCallback(async () => {
        const { data, error } = await supabaseClient
          .from('list_digitization_queue')
          .select('*')
          .eq('is_closed', false)
          .order('uploaded_at', { ascending: true })
          .limit(1)
          .single();
        if (!error && data) setActiveList(data);
        else setActiveList(null);
      }, []);

      useEffect(() => {
        loadActiveList();
      }, [loadActiveList]);

      const handleGenerate = async () => {
        const sanitized = sanitizeText(userText);
        if (sanitized.length < 80) {
          setError('El texto limpio (sin insultos o texto repetitivo) debe tener al menos 80 caracteres.');
          return;
        }
        setError('');

        const hashtagMadre = '#VZN26';
        const categoryMap = {
          listas: 'ls',
          donar: 'dn',
          denuncia: 'dn_abuse',
          proyectos: 'proyectos'
        };
        const hijo = `#VZN26_${categoryMap[category] || category}`;
        const trendTag = trendData?.trend || '#WorldCup2026';

        let bodyText = '';
        if (trendData?.templates?.length) {
          const template = trendData.templates[Math.floor(Math.random() * trendData.templates.length)];
          bodyText = template
            .replace('{{DENUNCIA}}', sanitized)
            .replace('{{TREND}}', trendTag);
        } else {
          bodyText = sanitized;
        }

        const finalBlock = `${bodyText}\n\n${hashtagMadre} ${hijo} ${trendTag}`;
        setPreview(finalBlock);

        try {
          await navigator.clipboard.writeText(finalBlock);
          alert('✅ Bloque copiado. Ahora pegalo en tus redes.');
        } catch {
          alert('⚠️ Copiá manualmente el texto desde la vista previa.');
        }
      };

      const handleConfirmList = async () => {
        if (!activeList) return;
        const { error: insertError } = await supabaseClient
          .from('list_confirmations')
          .insert({ list_id: activeList.id, user_fingerprint: fingerprint });
        if (insertError) {
          setListFeedback('Ya confirmaste esta lista.');
          return;
        }
        const newCount = (activeList.confirmation_count || 0) + 1;
        const { error: updateError } = await supabaseClient
          .from('list_digitization_queue')
          .update({ confirmation_count: newCount, is_closed: newCount >= 5 })
          .eq('id', activeList.id);
        if (updateError) {
          setListFeedback('Error al actualizar.');
          return;
        }
        setListFeedback('¡Gracias por confirmar!');
        loadActiveList();
      };

      const handleReportBroken = async () => {
        if (!activeList) return;
        const reports = (activeList.reports || 0) + 1;
        const { error } = await supabaseClient
          .from('list_digitization_queue')
          .update({ reports, is_closed: reports >= 2 })
          .eq('id', activeList.id);
        if (!error) {
          setListFeedback('Enlace reportado. Si llega a 2 reportes se cerrará.');
          loadActiveList();
        }
      };

      return (
        <div className="min-h-screen">
          <header className="p-4 bg-red-700 shadow-md">
            <nav className="flex justify-between items-center">
              <h1 className="text-xl font-bold">Unidos por Venezuela</h1>
              <div className="flex gap-4 text-sm">
                <a href="/" className="hover:underline">Inicio</a>
                <a href="/mapa.html" className="hover:underline">Mapa</a>
                <a href="/normalizar.html" className="hover:underline font-bold">Normalizar</a>
              </div>
            </nav>
          </header>

          <main className="p-6 max-w-3xl mx-auto">
            <div className="bg-gray-800 p-6 rounded-lg mb-6">
              <h2 className="text-2xl font-bold mb-2">📢 Publicar sin censura</h2>
              <p className="text-sm text-gray-300 mb-4">Saneamiento automático, plantillas orgánicas y hashtags fragmentados.</p>

              <div className="mb-4">
                <label className="block text-sm font-medium mb-1">Categoría</label>
                <select value={category} onChange={e => setCategory(e.target.value)} className="w-full p-2 bg-gray-700 rounded">
                  <option value="listas">Listas / Actas (#VZN26_ls)</option>
                  <option value="donar">Donaciones (#VZN26_dn)</option>
                  <option value="denuncia">Denuncias (#VZN26_dn_abuse)</option>
                  <option value="proyectos">Proyectos (#VZN26_proyectos)</option>
                </select>
              </div>

              <div className="mb-4">
                <label className="block text-sm font-medium mb-1">Tu descripción o enlace</label>
                <textarea
                  value={userText}
                  onChange={e => setUserText(e.target.value)}
                  rows="4"
                  className="w-full p-2 bg-gray-700 rounded"
                  placeholder="Escribí al menos 80 caracteres..."
                />
                <span className="text-xs text-gray-400">{userText.trim().length}/80</span>
                {error && <p className="text-red-400 text-sm mt-1">{error}</p>}
              </div>

              <div className="mb-4">
                <label className="block text-sm font-medium mb-1">Tendencia inyectada (Gemini)</label>
                <input type="text" value={trendData?.trend || 'Cargando...'} readOnly className="w-full p-2 bg-gray-700 rounded text-gray-400" />
              </div>

              <button
                onClick={handleGenerate}
                className="bg-yellow-600 hover:bg-yellow-700 py-2 px-6 rounded font-bold transition-colors"
              >
                Generar y copiar
              </button>

              {preview && (
                <div className="mt-6">
                  <label className="block text-sm font-medium mb-2">Vista previa generada:</label>
                  <pre className="bg-gray-950 p-4 rounded text-sm whitespace-pre-wrap font-mono border border-gray-700">{preview}</pre>
                </div>
              )}
            </div>

            <div className="bg-gray-800 p-6 rounded-lg">
              <h2 className="text-2xl font-bold mb-4">📋 Lista activa para digitalizar</h2>
              {activeList ? (
                <div>
                  <p className="text-sm mb-2">
                    <a href={activeList.source_url} target="_blank" rel="noopener noreferrer" className="text-blue-400 underline break-all">
                      {activeList.source_url}
                    </a>
                  </p>
                  <p className="text-xs text-gray-400 mb-4">
                    Confirmaciones: {activeList.confirmation_count}/5 &nbsp; | &nbsp; Subida: {new Date(activeList.uploaded_at).toLocaleString()}
                  </p>
                  <div className="flex gap-3">
                    <button onClick={handleConfirmList} className="bg-green-600 hover:bg-green-700 py-1 px-4 rounded text-sm font-medium">
                      ✅ Confirmar lista
                    </button>
                    <button onClick={handleReportBroken} className="bg-red-600 hover:bg-red-700 py-1 px-4 rounded text-sm font-medium">
                      🚫 Reportar enlace roto
                    </button>
                  </div>
                  {listFeedback && <p className="mt-2 text-sm text-yellow-300">{listFeedback}</p>}
                </div>
              ) : (
                <p className="text-gray-400">No hay listas pendientes. ¡Sé el primero en subir una!</p>
              )}
            </div>
          </main>

          <footer className="text-center text-xs text-gray-500 py-4">
            Proyecto ciudadano · Sistema híbrido anti-censura.
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NormalizarApp />);
  </script>
</body>
</html>
