<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Normalizar – SOS Venezuela</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#030712] text-gray-200 font-sans antialiased selection:bg-red-500/30 selection:text-red-200">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const supabaseClient = supabase.createClient(
      'https://pkajsigfbfwvyddpzhlo.supabase.co',
      'sb_publishable_AfVuP-hufHWREFUS9Q7vzg_4gypxd9U'
    );

    // ============================================================
    // Lógica determinista de normalización (sin IA)
    // ============================================================

    function generarTextoNormalizado(userText, ambito, accion, tendenciasDia = [], ubicacion = '') {
      const raiz = "#VZN26";
      let hashtagEspecifico = raiz;

      if (ambito === "ls") {
        hashtagEspecifico += "_ls";
      } else if (ambito === "dn") {
        hashtagEspecifico += "_dn";
        const mapeoAcciones = {
          fakecf: "_fakecf",
          realcf: "_realcf",
          abuse: "_abuse",
          hoax: "_hoax"
        };
        if (mapeoAcciones[accion]) {
          hashtagEspecifico += mapeoAcciones[accion];
        }
      } else if (ambito === "proyectos") {
        hashtagEspecifico += "_proyectos";
      }

      let geoTags = '';
      if (ubicacion && ubicacion.trim().length > 0) {
        const locClean = ubicacion.trim()
          .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
          .replace(/[^a-zA-Z0-9]/g, '')
          .toUpperCase();
        if (locClean.length > 0) {
          geoTags = `#SOS${locClean}`;
        }
      }

      const tendenciasSanitizadas = tendenciasDia
        .filter(t => t && t.trim().length > 0)
        .map(t => t.startsWith('#') ? t : `#${t}`)
        .join(' ');

      const tagsSet = new Set([raiz, hashtagEspecifico]);
      if (geoTags) tagsSet.add(geoTags);
      if (tendenciasSanitizadas) {
        tendenciasSanitizadas.split(' ').forEach(t => tagsSet.add(t));
      }
      const bloqueHashtags = Array.from(tagsSet).join(' ').trim();

      return `${userText}\n\n${bloqueHashtags}`;
    }

    function NormalizarApp() {
      const [ambito, setAmbito] = useState('ls');
      const [accion, setAccion] = useState('');
      const [userText, setUserText] = useState('');
      const [ubicacion, setUbicacion] = useState('');
      const [tendencias, setTendencias] = useState([]);
      const [preview, setPreview] = useState('');
      const [error, setError] = useState('');

      useEffect(() => {
        async function loadTrends() {
          const { data, error } = await supabaseClient
            .from('app_settings')
            .select('value')
            .eq('key', 'live_trends')
            .single();

          if (!error && data) {
            const trendValue = data.value;
            if (typeof trendValue === 'string') {
              setTendencias([trendValue]);
            } else if (Array.isArray(trendValue)) {
              setTendencias(trendValue);
            } else if (trendValue && typeof trendValue === 'object' && trendValue.trend) {
              setTendencias([trendValue.trend]);
            } else {
              setTendencias(['#EmergenciaVE']);
            }
          } else {
            setTendencias(['#EmergenciaVE']);
          }
        }

        loadTrends();
        const interval = setInterval(loadTrends, 300000);
        return () => clearInterval(interval);
      }, []);

      function sanitizeText(text) {
        let clean = text.replace(/\b(ba\s?){2,}/gi, '');
        const insults = ['puto', 'marico', 'guevon', 'malparido', 'hdp', 'hijueputa'];
        insults.forEach(word => {
          const regex = new RegExp(`\\b${word}\\b`, 'gi');
          clean = clean.replace(regex, '[abuso detectado]');
        });
        return clean.trim();
      }

      const handleGenerate = () => {
        const sanitized = sanitizeText(userText);
        if (sanitized.length < 80) {
          setError('El texto limpio (sin insultos o texto repetitivo) debe tener al menos 80 caracteres.');
          return;
        }
        setError('');

        const result = generarTextoNormalizado(sanitized, ambito, accion, tendencias, ubicacion);
        setPreview(result);

        navigator.clipboard.writeText(result)
          .then(() => alert('✅ Bloque copiado. Ahora pégalo en tus redes.'))
          .catch(() => alert('⚠️ Copiá manualmente el texto desde la vista previa.'));
      };

      const showAccion = ambito === 'dn';

      return (
        <div className="min-h-screen flex flex-col justify-between bg-radial from-gray-900 via-gray-950 to-black">
          <div>
            <header className="sticky top-0 z-50 backdrop-blur-md bg-[#090d16]/80 border-b border-gray-800/60 px-4">
              <nav className="flex justify-between items-center max-w-7xl mx-auto h-16">
                <div className="flex items-center gap-3">
                  <span className="text-red-500 animate-pulse font-bold">●</span>
                  <h1 className="text-md font-black tracking-wider text-white uppercase font-mono">SOS VEN - PORTAL</h1>
                  <span className="text-[10px] text-gray-500 font-mono bg-gray-900 border border-gray-800 px-1.5 py-0.5 rounded flex items-center gap-1">
                    v1.2.0
                    <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse inline-block ml-1"></span>
                    <span className="text-emerald-400 text-[8px] font-bold">NODO</span>
                  </span>
                </div>
                <div className="flex gap-1 bg-gray-950 p-1 rounded-lg border border-gray-800/80 text-xs font-mono">
                  <a href="/" className="text-gray-400 hover:text-white px-3 py-1.5 rounded-md transition-all">Inicio</a>
                  <a href="/normalizar.html" className="bg-gray-900 text-white border border-gray-800 px-3 py-1.5 rounded-md transition-all shadow-sm">Normalizar</a>
                  <a href="/mapa.html" className="text-gray-400 hover:text-white px-3 py-1.5 rounded-md transition-all">Mapa</a>
                  <a href="/devs.html" className="text-gray-400 hover:text-white px-3 py-1.5 rounded-md transition-all">Devs</a>
                </div>
              </nav>
            </header>

            <main className="p-4 md:p-6 max-w-4xl mx-auto">
              <div className="bg-[#090d16]/80 backdrop-blur-md p-6 rounded-xl border border-gray-800 shadow-xl">
                <h2 className="text-xl font-bold text-white font-mono mb-4 flex items-center gap-2">
                  <span className="text-blue-400">📢</span> Publicar sin censura
                </h2>
                <p className="text-xs text-gray-400 mb-6 leading-relaxed font-mono">
                  Plataforma de código abierto y contrainteligencia ciudadana que permite denunciar de forma anónima, con nombres y pruebas, a corruptos que desvían ayuda humanitaria en Venezuela, indexándolos en un mapa forense inmune a la censura. Incluye un motor que acelera la indexación de videos y posteos de auxilio en redes sociales para romper el bloqueo del algoritmo y maximizar su alcance, optimizando la localización de listas nuevas publicadas en diferentes perfiles al centralizarlas bajo un mismo <strong>hashtag</strong>.
                </p>

                <div className="space-y-4 text-xs font-mono">
                  <div>
                    <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Ámbito</label>
                    <select value={ambito} onChange={e => setAmbito(e.target.value)} className="w-full p-2.5 bg-gray-950 border border-gray-800 rounded-lg text-gray-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 transition-all">
                      <option value="ls">Listas / Actas (#VZN26_ls)</option>
                      <option value="dn">Donaciones / Denuncias (#VZN26_dn_*)</option>
                      <option value="proyectos">Proyectos (#VZN26_proyectos)</option>
                    </select>
                  </div>

                  {showAccion && (
                    <div>
                      <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Acción (para #VZN26_dn)</label>
                      <select value={accion} onChange={e => setAccion(e.target.value)} className="w-full p-2.5 bg-gray-950 border border-gray-800 rounded-lg text-gray-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 transition-all">
                        <option value="fakecf">Fake CF (estafa) → #VZN26_dn_fakecf</option>
                        <option value="realcf">Real CF (auditada) → #VZN26_dn_realcf</option>
                        <option value="abuse">Abuso militar/policial → #VZN26_dn_abuse</option>
                        <option value="hoax">Desmentido (fake news) → #VZN26_dn_hoax</option>
                      </select>
                    </div>
                  )}

                  <div className="bg-gray-950/40 p-3 rounded-lg border border-gray-800">
                    <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Códigos de hashtag disponibles</p>
                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-1.5 text-[10px] font-mono">
                      <div className="bg-gray-950/60 px-2 py-1 rounded border border-gray-800">
                        <span className="text-emerald-400">#VZN26_ls</span>
                        <span className="text-gray-500 block">Listas / Actas</span>
                      </div>
                      <div className="bg-gray-950/60 px-2 py-1 rounded border border-gray-800">
                        <span className="text-red-400">#VZN26_dn_fakecf</span>
                        <span className="text-gray-500 block">Estafa / Fraude</span>
                      </div>
                      <div className="bg-gray-950/60 px-2 py-1 rounded border border-gray-800">
                        <span className="text-green-400">#VZN26_dn_realcf</span>
                        <span className="text-gray-500 block">Recaudación real</span>
                      </div>
                      <div className="bg-gray-950/60 px-2 py-1 rounded border border-gray-800">
                        <span className="text-purple-400">#VZN26_dn_abuse</span>
                        <span className="text-gray-500 block">Abuso de autoridad</span>
                      </div>
                      <div className="bg-gray-950/60 px-2 py-1 rounded border border-gray-800">
                        <span className="text-yellow-400">#VZN26_dn_hoax</span>
                        <span className="text-gray-500 block">Desmentido / Fake news</span>
                      </div>
                      <div className="bg-gray-950/60 px-2 py-1 rounded border border-gray-800">
                        <span className="text-blue-400">#VZN26_proyectos</span>
                        <span className="text-gray-500 block">Proyectos comunitarios</span>
                      </div>
                    </div>
                  </div>

                  <div>
                    <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Ubicación (opcional)</label>
                    <input type="text" value={ubicacion} onChange={e => setUbicacion(e.target.value)} className="w-full p-2.5 bg-gray-950 border border-gray-800 rounded-lg text-gray-200 placeholder-gray-700 focus:outline-none focus:border-blue-500 transition-all" placeholder="Ej: Caracas, Valencia, Zulia..." />
                    <p className="text-[10px] text-gray-500 mt-1">Si escribes una ciudad, se generará un hashtag geolocalizado (ej. #SOSCaracas).</p>
                  </div>

                  <div>
                    <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Tu descripción o enlace</label>
                    <textarea value={userText} onChange={e => setUserText(e.target.value)} rows="4" className="w-full p-2.5 bg-gray-950 border border-gray-800 rounded-lg text-gray-200 placeholder-gray-700 focus:outline-none focus:border-blue-500 transition-all resize-none" placeholder="Escribí al menos 80 caracteres..." />
                    <span className="text-[10px] text-gray-500">{userText.trim().length}/80</span>
                    {error && <p className="text-red-400 text-[11px] mt-1">{error}</p>}
                  </div>

                  <div>
                    <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Tendencias del día (inyección)</label>
                    <div className="flex flex-wrap gap-1 bg-gray-950 p-2 rounded-lg border border-gray-800 min-h-8">
                      {tendencias.length > 0 ? (
                        tendencias.map((t, idx) => (
                          <span key={idx} className="text-blue-400 text-[11px] bg-blue-950/30 px-2 py-0.5 rounded border border-blue-900/30">
                            {t.startsWith('#') ? t : `#${t}`}
                          </span>
                        ))
                      ) : (
                        <span className="text-gray-500 text-[11px]">Cargando tendencias…</span>
                      )}
                    </div>
                    <p className="text-[10px] text-gray-500 mt-1">Estos hashtags se añadirán automáticamente a tu publicación.</p>
                  </div>

                  <button onClick={handleGenerate} className="w-full bg-gradient-to-r from-blue-700 to-blue-600 hover:from-blue-600 hover:to-blue-500 text-white py-2.5 rounded-lg font-bold uppercase tracking-wider shadow-lg shadow-blue-900/20 active:scale-[0.99] transition-all">
                    Generar y copiar
                  </button>

                  {preview && (
                    <div className="mt-4">
                      <label className="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">Vista previa generada:</label>
                      <pre className="bg-[#030712] p-3 rounded-lg border border-gray-800 text-gray-300 text-[11px] whitespace-pre-wrap font-mono">{preview}</pre>
                    </div>
                  )}
                </div>
              </div>
            </main>
          </div>

          {/* Footer unificado */}
          <footer className="bg-[#070b12] border-t border-gray-900/60 p-6 text-center text-gray-400 space-y-4 font-mono text-xs">
            <div className="max-w-5xl mx-auto space-y-3">
              <div className="text-[11px] text-gray-400 font-semibold">Aviso de Neutralidad Tecnológica y Auditoría Ciudadana</div>
              <div className="text-[10px] text-gray-400/80 leading-relaxed border-b border-gray-800/50 pb-3">
                Esta plataforma opera exclusivamente como un nodo de infraestructura tecnológica automatizado para la indexación de archivos y documentos de interés público, al amparo del Artículo 13 de la Convención Americana sobre Derechos Humanos y la Convención de las Naciones Unidas contra la Corrupción.
                <br /><br />
                El sistema no genera, edita, promociona ni valida la veracidad de los reportes emitidos de forma anónima por los usuarios. Toda mención a presuntos hechos delictivos debe entenderse bajo el principio de inocencia y en carácter potencial (artículo atribuible a las fuentes documentales aportadas). La plataforma se compromete a remover de forma expedita cualquier registro que, mediante el canal de impugnación oficial, se demuestre fehacientemente como falso, injurioso o violatorio de la legislación internacional de derechos humanos.
              </div>
              <div className="text-[10px] text-gray-500/80 leading-relaxed">
                <span className="font-bold text-gray-400">Política de Zero-Knowledge:</span> Esta plataforma no registra, almacena ni procesa direcciones IP, metadatos de conectividad, geolocalizaciones precisas de red de los nodos emisores, ni datos de identidad de los usuarios de conformidad con las directrices globales de privacidad por diseño (Privacy by Design).
              </div>
            </div>
            <div className="pt-3 border-t border-gray-900/40 space-y-1">
              <p className="font-bold text-gray-400 text-xs tracking-tight">
                Proyecto Córdoba-Caracas · Desarrollado por Andalucia Projects 🇦🇷
              </p>
              <p className="text-[10px] text-gray-600">
                © 2026 Andalucia Projects · Framework de desarrollo con fines educativos e impacto social humanitario. Licencias libres y código abierto.
              </p>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NormalizarApp />);
  </script>
</body>
</html>
